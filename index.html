<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oldypro | Professional Trading Terminal</title>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --card-bg: #1e2329;
            --text-main: #eaecef;
            --green: #00c076;
            --red: #cf304a;
            --accent: #fcd535;
            --border: #333;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo { color: var(--accent); font-size: 1.5rem; font-weight: bold; }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
        }

        .oldy-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 20px; color: #848e9c; text-transform: uppercase; letter-spacing: 1px; }

        /* Transfer Section */
        .transfer-row { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 8px; color: #848e9c; }
        select, input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .confirm-btn {
            width: 100%;
            background: var(--accent);
            color: black;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .confirm-btn:hover { opacity: 0.9; }

        /* Trade Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.7rem; color: #848e9c; padding: 12px 8px; text-transform: uppercase; }
        td { padding: 16px 8px; border-top: 1px solid var(--border); font-size: 0.95rem; }

        .pnl-plus { color: var(--green); font-weight: bold; }
        .pnl-minus { color: var(--red); font-weight: bold; }

        .exit-btn {
            background: rgba(207, 48, 74, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .exit-btn:hover { background: var(--red); color: white; }

        .live-tag {
            background: rgba(0, 192, 118, 0.1);
            color: var(--green);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">OLDYPRO <span style="color:white; font-size: 0.8rem; font-weight: normal;">Terminal v1.0</span></div>
    <div id="connection-status"><span class="live-tag">● BINANCE LIVE</span></div>
</div>

<div class="dashboard-container">
    
    <div class="oldy-card">
        <h2>Active Positions</h2>
        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Entry Price</th>
                    <th>Mark Price</th>
                    <th>Unrealized PnL</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <strong>BTC/USDT</strong><br>
                        <small style="color:var(--green)">Isolated 10x</small>
                    </td>
                    <td>64,250.00</td>
                    <td id="btc-price" style="font-family: monospace;">---</td>
                    <td id="btc-pnl" style="font-family: monospace;">$0.00</td>
                    <td><button class="exit-btn" onclick="exitTrade('BTCUSDT')">Exit Trade</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="oldy-card">
        <h2>Transfer Funds</h2>
        <div class="transfer-row">
            <label>From</label>
            <select id="fromWallet">
                <option value="spot">Spot Wallet</option>
                <option value="futures">Futures Wallet</option>
                <option value="funding">Funding Wallet</option>
            </select>
        </div>
        
        <div style="text-align: center; margin: -5px 0 10px 0; color: var(--accent);">⇅</div>

        <div class="transfer-row">
            <label>To</label>
            <select id="toWallet">
                <option value="futures">Futures Wallet</option>
                <option value="spot">Spot Wallet</option>
                <option value="funding">Funding Wallet</option>
            </select>
        </div>

        <div class="transfer-row">
            <label>Amount (USDT)</label>
            <input type="number" id="transferAmount" placeholder="0.00" step="0.01">
        </div>

        <button class="confirm-btn" onclick="processTransfer()">Confirm Transfer</button>
    </div>

</div>

<script>
    // --- WEBSOCKET CONFIGURATION ---
    const btcPriceEl = document.getElementById('btc-price');
    const btcPnlEl = document.getElementById('btc-pnl');
    
    // User Data (In a real app, this comes from your database)
    const entryPrice = 64250.00;
    const positionSize = 0.05; // 0.05 BTC

    // Connect to Binance Public WebSocket (No API key needed for market data)
    const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const currentPrice = parseFloat(data.c);

        // Update Live Price
        btcPriceEl.innerText = currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2});

        // Calculate PnL: (Current - Entry) * Size
        const pnl = (currentPrice - entryPrice) * positionSize;
        const pnlPercent = ((currentPrice - entryPrice) / entryPrice) * 100;

        // Update UI styling based on profit/loss
        btcPnlEl.innerText = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toFixed(2) + ` (${pnlPercent.toFixed(2)}%)`;
        btcPnlEl.className = pnl >= 0 ? 'pnl-plus' : 'pnl-minus';
    };

    socket.onerror = (err) => {
        console.error("WebSocket Error: ", err);
        btcPriceEl.innerText = "Connection Error";
    };

    // --- INTERACTION LOGIC ---
    function exitTrade(symbol) {
        const finalPnl = btcPnlEl.innerText;
        if(confirm(`Confirm Exit ${symbol} at current price?\nEstimated PnL: ${finalPnl}`)) {
            alert(`Order Sent: Closing ${symbol} position.`);
            // Backend integration: fetch('/api/trade/exit', { method: 'POST', ... })
        }
    }

    function processTransfer() {
        const amount = document.getElementById('transferAmount').value;
        const from = document.getElementById('fromWallet').value;
        const to = document.getElementById('toWallet').value;

        if(!amount || amount <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        alert(`Transfer Request Submitted:\n${amount} USDT from ${from} to ${to}.`);
        // Backend integration: fetch('/api/wallet/transfer', { method: 'POST', ... })
    }
</script>

</body>
</html>
