<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oldypro Ultimate | Pro Exchange Terminal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --text: #eaecef;
            --yellow: #fcd535; --green: #00c076; --red: #cf304a; --border: #333;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid var(--border); }
        
        #exchange-app { display: none; }
        .header { display: flex; background: var(--card); padding: 15px 25px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); justify-content: space-between; }
        
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; height: calc(100vh - 110px); }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
        
        /* MODE TABS (Spot/Futures) */
        .mode-tabs { display: flex; background: var(--bg); border-radius: 4px; padding: 4px; margin-bottom: 15px; }
        .m-tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 4px; color: #848e9c; }
        .m-tab.active { background: var(--card); color: var(--yellow); border: 1px solid var(--border); }

        h2 { color: var(--yellow); font-size: 11px; text-transform: uppercase; margin: 0 0 10px 0; border-bottom: 1px solid #2b3139; padding-bottom: 8px; }
        input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; margin-top: 8px; box-sizing: border-box; }
        
        .btn { width: 100%; border: none; padding: 14px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .bg-green { background: var(--green); color: white; }
        .bg-red { background: var(--red); color: white; }
        .bg-yellow { background: var(--yellow); color: black; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 40px; border-radius: 50px; font-weight: bold; display: none; z-index: 10001; background: var(--green); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .mail-list { flex: 1; overflow-y: auto; }
        .mail-item { padding: 10px; background: rgba(255,255,255,0.03); margin-bottom: 5px; border-radius: 4px; border-left: 3px solid var(--yellow); font-size: 11px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="color: var(--yellow); margin:0;">OLDYPRO</h1>
        <p style="font-size: 11px; color: #848e9c; margin-bottom: 20px;">Secure Access Terminal</p>
        <input type="email" id="email-input" placeholder="Gmail Address">
        <button class="btn bg-yellow" onclick="sendMagicLink()">SEND ACCESS LINK</button>
        <p id="auth-status" style="margin-top: 15px; color: var(--green); font-size: 11px;"></p>
    </div>
</div>

<div id="exchange-app">
    <div class="header">
        <div><span style="font-size: 10px; color: #848e9c;">USER</span><br><b id="display-email">---</b></div>
        <div style="text-align: right;"><span style="font-size: 10px; color: #848e9c;">TOTAL EQUITY</span><br><b id="bal-usdt" style="color: var(--yellow); font-size: 18px;">$0.00</b></div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="mode-tabs">
                <div id="tab-spot" class="m-tab active" onclick="setMode('SPOT')">SPOT</div>
                <div id="tab-futures" class="m-tab" onclick="setMode('FUTURES')">FUTURES</div>
            </div>
            
            <h2 id="trade-title">Spot Trade</h2>
            <select id="trade-side">
                <option value="BUY">BUY / LONG</option>
                <option value="SELL">SELL / SHORT</option>
            </select>

            <div id="futures-options" style="display:none;">
                <label style="font-size:10px; color:#848e9c;">LEVERAGE</label>
                <select id="leverage">
                    <option value="1">1x</option>
                    <option value="10">10x</option>
                    <option value="20">20x</option>
                    <option value="50">50x</option>
                    <option value="100">100x</option>
                </select>
            </div>

            <input type="number" id="trade-amt" placeholder="Amount (USDT)">
            <button id="exec-btn" class="btn bg-green" onclick="executeTrade()">OPEN POSITION</button>
        </div>

        <div class="panel">
            <h2>BTC/USDT Real-Time</h2>
            <div style="text-align: center; margin-top: 50px;">
                <div id="live-price" style="font-size: 50px; font-weight: bold; color: var(--yellow);">---</div>
                <div style="font-size: 11px; color: var(--green); margin-top: 5px;">LIVE FEED CONNECTED</div>
            </div>
            
            <div style="margin-top:auto;">
                <h2>Open Orders</h2>
                <div style="text-align:center; padding:20px; color:#444; font-size:11px;">No active orders found in database.</div>
            </div>
        </div>

        <div class="panel">
            <h2>Finance Hub</h2>
            <input type="text" id="tg-user" placeholder="Telegram @Handle">
            <input type="number" id="fin-amt" placeholder="USDT Amount">
            <button class="btn bg-green" style="margin-top: 10px;" onclick="finance('deposit')">DEPOSIT FUNDS</button>
            <button class="btn bg-red" style="margin-top: 10px;" onclick="finance('withdraw')">WITHDRAW FUNDS</button>
            
            <h2 style="margin-top: 30px;">Mailbox & History</h2>
            <div id="mailbox" class="mail-list"></div>
        </div>
    </div>
</div>

<div id="toast">REQUEST HAS BEEN SENDED</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "oldycrypto.firebaseapp.com",
        databaseURL: "https://oldycrypto-default-rtdb.firebaseio.com",
        projectId: "oldycrypto"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // YOUR PERSONAL WEBHOOK URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ29D-u_j53AJVK1l0G6CA8ocBoH5aEFn1KdTPLZbXTQVNbMFuLjPPR293emBm5pn3/exec";

    let currentMode = 'SPOT';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('trade-title').innerText = mode + " Trade";
        document.getElementById('tab-spot').className = mode === 'SPOT' ? 'm-tab active' : 'm-tab';
        document.getElementById('tab-futures').className = mode === 'FUTURES' ? 'm-tab active' : 'm-tab';
        document.getElementById('futures-options').style.display = mode === 'FUTURES' ? 'block' : 'none';
    }

    function sendMagicLink() {
        const email = document.getElementById('email-input').value;
        if(!email) return alert("Missing Email");
        auth.sendSignInLinkToEmail(email, { url: window.location.href, handleCodeInApp: true })
            .then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                document.getElementById('auth-status').innerText = "Magic Link sent to inbox!";
            });
    }

    if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirm Email:');
        auth.signInWithEmailLink(email, window.location.href).then(res => {
            window.localStorage.removeItem('emailForSignIn');
            initTerminal(res.user);
        });
    }

    function initTerminal(user) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('exchange-app').style.display = 'block';
        document.getElementById('display-email').innerText = user.email;
        
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            document.getElementById('live-price').innerText = parseFloat(JSON.parse(e.data).c).toLocaleString();
        };

        const cleanPath = user.email.replace(/[.#$[\]]/g, "_");
        db.ref('mailbox/' + cleanPath).on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('mailbox').innerHTML = Object.values(data).reverse().map(m => `
                    <div class="mail-item">
                        <span>${m.text}</span>
                        <b style="color:${m.status === 'ACCEPTED' ? '#00c076' : '#cf304a'}">${m.status}</b>
                    </div>
                `).join('');
            }
        });
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function finance(type) {
        const amt = document.getElementById('fin-amt').value;
        const tg = document.getElementById('tg-user').value;
        if(!amt || !tg) return alert("Fill all fields");
        showToast();
        fetch(GAS_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ action: "request", type, amount: amt, tg: tg, email: auth.currentUser.email })
        });
    }

    function executeTrade() {
        const amt = document.getElementById('trade-amt').value;
        const side = document.getElementById('trade-side').value;
        const lev = document.getElementById('leverage').value;
        if(!amt) return alert("Enter amount");
        showToast();
        fetch(GAS_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ 
                action: "trade", mode: currentMode, side, amt, leverage: (currentMode==='SPOT' ? '1x' : lev), 
                tg: document.getElementById('tg-user').value, email: auth.currentUser.email 
            })
        });
    }
</script>
</body>
</html>
