<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldyPro | Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: #050505; --surface: #0b0e11; --card: #1e2329;
            --primary: #fcd535; --border: #2b3139; --text: #eaecef;
            --text-muted: #848e9c; --green: #0ecb81; --red: #f6465d;
        }

        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        nav { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); cursor: pointer; }
        .nav-links { display: flex; gap: 24px; margin-left: 30px; }
        .nav-item { font-size: 0.9rem; font-weight: 500; cursor: pointer; color: var(--text-muted); }
        .nav-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: -22px; }

        .page { display: none; height: calc(100vh - 64px); width: 100%; overflow-y: auto; }
        .page.active { display: block; }
        #terminal-page.active { display: grid; grid-template-columns: 1fr 340px; }

        /* Market Table */
        .market-container { padding: 40px; }
        .m-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
        .m-table th { text-align: left; padding: 15px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        .m-table td { padding: 15px; border-bottom: 1px solid var(--border); font-family: 'Space Mono'; font-size: 0.9rem; }
        .m-table tr:hover { background: rgba(255,255,255,0.02); }

        .btn-trade { background: var(--primary); color: black; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }

        /* Grid for Terminal */
        #tv_chart_container { background: var(--border); }
        .order-panel { background: var(--surface); padding: 20px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid var(--border); }
        
        .trade-input { background: var(--bg); border: 1px solid var(--border); padding: 12px; color: white; border-radius: 4px; width: 100%; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <nav>
        <div style="display:flex; align-items:center;">
            <div class="logo">OLDYPRO</div>
            <div class="nav-links">
                <div class="nav-item active" id="link-chart" onclick="showPage('terminal-page')">Chart</div>
                <div class="nav-item" id="link-market" onclick="showPage('market-page')">Market</div>
                <div class="nav-item" id="link-portfolio" onclick="showPage('portfolio-page')">Portfolio</div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-trade" onclick="demoDeposit()">+ $10k Demo</button>
            <div id="price-ticker" style="color:var(--primary); font-family:'Space Mono'; align-self:center; margin:0 15px;">Loading...</div>
        </div>
    </nav>

    <div id="terminal-page" class="page active">
        <div id="tv_chart_container"></div>
        <div class="order-panel">
            <h4 style="margin:0; color:var(--text-muted)">Order Entry</h4>
            <select class="trade-input" id="coin-select" onchange="changeAsset()">
                <option value="BTC">BTC / USDT</option>
                <option value="ETH">ETH / USDT</option>
                <option value="BNB">BNB / USDT</option>
                <option value="SOL">SOL / USDT</option>
            </select>
            <input type="number" id="trade-amount" class="trade-input" placeholder="Amount">
            <button class="btn-trade" style="height:50px; font-size:1rem;" onclick="alert('Order Logic Connected')">Place Order</button>
        </div>
    </div>

    <div id="market-page" class="page">
        <div class="market-container">
            <h2 style="margin-bottom:20px;">Cryptocurrency Market (Top 100)</h2>
            <table class="m-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Token</th>
                        <th>Price</th>
                        <th>24h Change</th>
                        <th>Market Cap</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="market-list">
                    <tr><td colspan="6" style="text-align:center; padding:50px;">Fetching Live Market Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="portfolio-page" class="page">
        <div style="padding:40px;">
            <h2>Your Portfolio Overview</h2>
            <p style="color:var(--text-muted)">Connect wallet or use Demo funds to see holdings.</p>
        </div>
    </div>

    <script>
        let currentAsset = "BTC";

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if(pageId === 'terminal-page') document.getElementById('link-chart').classList.add('active');
            if(pageId === 'market-page') {
                document.getElementById('link-market').classList.add('active');
                fetchMarketData();
            }
            if(pageId === 'portfolio-page') document.getElementById('link-portfolio').classList.add('active');
        }

        async function fetchMarketData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                const data = await response.json();
                const container = document.getElementById('market-list');
                container.innerHTML = "";

                data.forEach((coin, index) => {
                    const row = `
                        <tr>
                            <td style="color:var(--text-muted)">${index + 1}</td>
                            <td style="font-weight:bold;"><img src="${coin.image}" width="20" style="vertical-align:middle; margin-right:10px;"> ${coin.name} <span style="color:var(--text-muted); font-size:0.7rem;">${coin.symbol.toUpperCase()}</span></td>
                            <td>$${coin.current_price.toLocaleString()}</td>
                            <td style="color:${coin.price_change_percentage_24h >= 0 ? 'var(--green)' : 'var(--red)'}">
                                ${coin.price_change_percentage_24h.toFixed(2)}%
                            </td>
                            <td style="color:var(--text-muted)">$${coin.market_cap.toLocaleString()}</td>
                            <td><button class="btn-trade" onclick="loadCoin('${coin.symbol.toUpperCase()}')">Trade</button></td>
                        </tr>
                    `;
                    container.innerHTML += row;
                });
            } catch (error) {
                console.error("Market API Error:", error);
            }
        }

        function loadCoin(symbol) {
            // Mapping for common pairs, defaulting to BTC if not in our select
            const select = document.getElementById('coin-select');
            const options = Array.from(select.options).map(o => o.value);
            
            if(options.includes(symbol)) {
                select.value = symbol;
            } else {
                // If it's a new coin from top 100, we'd ideally add it to the list
                const newOpt = document.createElement("option");
                newOpt.value = symbol;
                newOpt.text = `${symbol} / USDT`;
                select.add(newOpt);
                select.value = symbol;
            }
            
            currentAsset = symbol;
            showPage('terminal-page');
            initChart();
        }

        function initChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + currentAsset + "USDT",
                "interval": "15",
                "theme": "dark",
                "container_id": "tv_chart_container",
                "style": "1",
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
            });
        }

        function changeAsset() {
            currentAsset = document.getElementById('coin-select').value;
            initChart();
        }

        // Live Ticker for BTC
        setInterval(async () => {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const d = await r.json();
            document.getElementById('price-ticker').innerText = "BTC: $" + parseFloat(d.price).toLocaleString();
        }, 3000);

        window.onload = initChart;
    </script>
</body>
</html>
