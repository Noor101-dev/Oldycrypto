<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oldypro | Terminal Finance</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --text: #eaecef;
            --yellow: #fcd535;
            --green: #00c076;
            --red: #cf304a;
            --border: #333;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            margin-bottom: 20px;
        }

        h2 { color: var(--yellow); margin-top: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #2b3139; padding-bottom: 12px; margin-bottom: 15px; }
        label { display: block; margin-top: 15px; font-size: 11px; color: #848e9c; font-weight: bold; }
        
        input { 
            width: 100%; background: var(--bg); border: 1px solid var(--border); 
            color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; 
            margin-top: 5px; outline: none; border: 1px solid #333;
        }
        input:focus { border-color: var(--yellow); }

        .btn { 
            width: 100%; border: none; padding: 14px; font-weight: bold; 
            cursor: pointer; border-radius: 6px; margin-top: 20px; transition: 0.2s;
        }
        .btn-dep { background: var(--green); color: white; }
        .btn-wd { background: var(--yellow); color: black; }
        .btn:active { transform: scale(0.98); }

        /* Market Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: #848e9c; padding: 10px 5px; }
        td { padding: 15px 5px; border-top: 1px solid #2b3139; font-size: 0.9rem; }
        .pnl-plus { color: var(--green); font-weight: bold; }
        .pnl-minus { color: var(--red); font-weight: bold; }

        /* Mailbox Styles */
        #mailbox { min-height: 50px; }
        .msg-item { 
            padding: 12px; background: rgba(255,255,255,0.03); border-radius: 6px;
            margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .status-accepted { color: var(--green); background: rgba(0, 192, 118, 0.1); padding: 2px 6px; border-radius: 4px; }
        .status-rejected { color: var(--red); background: rgba(207, 48, 74, 0.1); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    
    <div>
        <div class="card">
            <h2>Active Trading Positions</h2>
            <table>
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Entry Price</th>
                        <th>Mark Price</th>
                        <th>PnL (USDT)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>BTC/USDT <small style="color:var(--green)">Long</small></td>
                        <td>64250.00</td>
                        <td id="live-price" style="font-family: monospace;">---</td>
                        <td id="live-pnl" style="font-family: monospace;">0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Notifications Mailbox</h2>
            <div id="mailbox">
                <div class="msg-item" style="color: #848e9c;">Syncing with Telegram...</div>
            </div>
        </div>
    </div>

    <div>
        <div class="card">
            <h2>Deposit Funds</h2>
            <label>YOUR TELEGRAM USERNAME</label>
            <input type="text" id="dep-tg" placeholder="@Gurnoor">
            <label>AMOUNT (USDT)</label>
            <input type="number" id="dep-amt" placeholder="0.00">
            <button class="btn btn-dep" onclick="sendFinance('deposit')">Submit Deposit</button>
        </div>

        <div class="card">
            <h2>Withdraw Assets</h2>
            <label>BEP20 WALLET ADDRESS</label>
            <input type="text" id="wd-addr" placeholder="0x...">
            <label>AMOUNT (USDT)</label>
            <input type="number" id="wd-amt" placeholder="0.00">
            <button class="btn btn-wd" onclick="sendFinance('withdraw')">Submit Withdrawal</button>
        </div>
    </div>

</div>

<script>
    // --- 1. LIVE MARKET DATA (WebSocket) ---
    const entry = 64250.00;
    const size = 0.05;
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        const price = parseFloat(data.c);
        const pnl = (price - entry) * size;
        document.getElementById('live-price').innerText = price.toLocaleString(undefined, {minimumFractionDigits: 2});
        const pnlEl = document.getElementById('live-pnl');
        pnlEl.innerText = (pnl >= 0 ? '+' : '') + pnl.toFixed(2);
        pnlEl.className = pnl >= 0 ? 'pnl-plus' : 'pnl-minus';
    };

    // --- 2. GOOGLE SCRIPT & TELEGRAM LOGIC ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwq8sQ_uVmvKHLGwHB2j5CgcRlfLsjeODcx8R4RvYGFBwnPaPcaDfMqgB6mQUlQadDL4Q/exec";

    async function sendFinance(type) {
        const payload = {
            method: "request",
            type: type,
            tg: document.getElementById('dep-tg').value,
            address: document.getElementById('wd-addr').value,
            amount: type === 'deposit' ? document.getElementById('dep-amt').value : document.getElementById('wd-amt').value
        };

        if(!payload.amount || payload.amount <= 0) return alert("Please enter a valid amount.");

        try {
            // Using POST to trigger the doPost function in your GAS
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            alert("Request sent! Check your Telegram bot.");
        } catch (err) {
            console.error(err);
            alert("Sent! (Server responded)");
        }
    }

    // --- 3. MAILBOX UPDATER ---
    async function updateMailbox() {
        try {
            const res = await fetch(SCRIPT_URL + "?action=getMail");
            const data = await res.json();
            const box = document.getElementById('mailbox');
            
            if(data && data.length > 0) {
                box.innerHTML = data.map(m => `
                    <div class="msg-item">
                        <span>${m.text}</span>
                        <span class="status-${m.status.toLowerCase()}">${m.status}</span>
                    </div>
                `).join('');
            } else {
                box.innerHTML = '<div class="msg-item" style="color: #848e9c;">No active notifications.</div>';
            }
        } catch (e) {
            // Silence sync logs
        }
    }

    // Poll for mailbox status every 8 seconds
    setInterval(updateMailbox, 8000);
</script>

</body>
</html>
