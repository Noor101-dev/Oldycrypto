<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldyPro | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --bg: #050505; --surface: #0b0e11; --card: #1e2329;
            --primary: #fcd535; --border: #2b3139; --text: #eaecef;
            --text-muted: #848e9c; --green: #0ecb81; --red: #f6465d;
        }

        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: auto; }
        nav { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 1000; }
        .nav-left, .nav-links { display: flex; align-items: center; gap: 24px; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); cursor: pointer; text-decoration: none; }
        .nav-item { font-size: 0.9rem; font-weight: 500; cursor: pointer; color: var(--text-muted); }
        .nav-item:hover, .nav-item.active { color: var(--text); }

        .balance-display { background: #1e2329; padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-size: 0.85rem; }
        .btn-auth { background: var(--primary); color: black; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .page { display: none; min-height: calc(100vh - 64px); padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        .terminal-grid { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 104px); background: var(--border); border-radius: 8px; overflow: hidden; }
        .chart-box { background: var(--bg); height: 100%; }
        .order-panel { background: var(--surface); padding: 24px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid var(--border); }
        
        .trade-input { background: var(--bg); border: 1px solid var(--border); padding: 12px; color: white; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Space Mono'; outline: none; }
        .trade-input:focus { border-color: var(--primary); }

        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        .history-table th { text-align: left; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); }
        .history-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }

        .exit-btn { background: rgba(246, 70, 93, 0.1); color: var(--red); border: 1px solid var(--red); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-weight: 600; }
        .exit-btn:hover { background: var(--red); color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="logo" onclick="showPage('spot')">OLDYPRO</div>
            <div class="nav-links">
                <div class="nav-item" id="nav-spot" onclick="showPage('spot')">Trade</div>
                <div class="nav-item" id="nav-portfolio" onclick="showPage('portfolio')">Portfolio</div>
            </div>
        </div>
        <div class="nav-right" style="display: flex; gap: 15px; align-items: center;">
            <div class="balance-display">
                <span id="nav-balance" style="color: var(--green);">0.00</span> <span style="font-size:0.7rem; color:var(--text-muted)">USDT</span>
            </div>
            <div onclick="showPage('portfolio')" style="cursor:pointer; width:32px; height:32px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid var(--border);">U</div>
        </div>
    </nav>

    <div id="spot" class="page">
        <div class="terminal-grid">
            <div class="chart-box" id="tradingview_main"></div>
            <div class="order-panel">
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <button id="buy-mode" style="flex:1; padding:12px; background:var(--green); border:none; color:white; font-weight:bold; cursor:pointer; border-radius:4px;" onclick="setTradeMode('buy')">BUY</button>
                    <button id="sell-mode" style="flex:1; padding:12px; background:transparent; border:1px solid var(--border); color:var(--text-muted); font-weight:bold; cursor:pointer; border-radius:4px;" onclick="setTradeMode('sell')">SELL</button>
                </div>

                <div style="font-size: 0.75rem; color: var(--text-muted);">Available: <span id="trade-balance" style="color:white">0.00</span> <span id="asset-label">USDT</span></div>
                
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:0.7rem; color:var(--text-muted)">Price</label>
                    <input type="number" id="trade-price" class="trade-input" readonly>
                </div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <label style="font-size:0.7rem; color:var(--text-muted)">Amount BTC</label>
                    <input type="number" id="trade-amount" class="trade-input" placeholder="0.00" oninput="calculateTotal()">
                </div>

                <div style="padding:15px; background:var(--bg); border-radius:4px; font-size:0.9rem; border:1px solid var(--border);">
                    <span style="color:var(--text-muted)">Total Est:</span>
                    <span id="trade-total" style="float:right; font-family:'Space Mono'">0.00 USDT</span>
                </div>

                <button id="exec-btn" class="btn-auth" style="width:100%; padding:15px; background:var(--green); color:white; font-size:1rem;" onclick="executeTrade()">BUY BTC</button>
                
                <div id="active-position-box" style="margin-top: 10px; padding: 15px; border: 1px solid var(--border); border-radius: 4px; display: none; background: rgba(14, 203, 129, 0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.8rem; font-weight:bold; color:var(--green)">LONG BTC</span>
                        <button class="exit-btn" onclick="exitAllPositions()">EXIT TRADE</button>
                    </div>
                    <div style="margin-top:10px; font-size:0.75rem; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div>Size: <span id="pos-size" style="color:white">0.00</span></div>
                        <div>Value: <span id="pos-value" style="color:white">$0.00</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="portfolio" class="page">
        <div style="background:var(--surface); padding:30px; border-radius:12px; border:1px solid var(--border); margin-bottom:30px;">
            <p style="color:var(--text-muted); margin:0;">Account Equity</p>
            <h1 style="margin:10px 0; font-size:2.5rem; color:var(--primary)">$<span id="total-equity">0.00</span></h1>
            <button class="btn-auth" onclick="addFunds()">+ Quick Deposit</button>
        </div>

        <h3>Order History</h3>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let usdtBalance = parseFloat(localStorage.getItem('usdt_balance')) || 5000.00;
        let btcBalance = parseFloat(localStorage.getItem('btc_balance')) || 0.0000;
        let tradeHistory = JSON.parse(localStorage.getItem('trade_history')) || [];
        let livePrice = 0;
        let currentMode = 'buy';

        function updatePrice() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(res => res.json())
                .then(data => {
                    livePrice = parseFloat(data.price);
                    if(document.getElementById('trade-price')) document.getElementById('trade-price').value = livePrice.toFixed(2);
                    updateUI();
                });
        }
        setInterval(updatePrice, 3000);

        function updateUI() {
            const btcValue = btcBalance * livePrice;
            const totalEq = usdtBalance + btcValue;

            // Nav
            document.getElementById('nav-balance').innerText = usdtBalance.toLocaleString(undefined, {minimumFractionDigits:2});
            
            // Spot Trade Page
            if(document.getElementById('trade-balance')) {
                document.getElementById('trade-balance').innerText = currentMode === 'buy' ? usdtBalance.toFixed(2) : btcBalance.toFixed(4);
            }
            
            // Position Box (Exit Button logic)
            const posBox = document.getElementById('active-position-box');
            if(btcBalance > 0) {
                posBox.style.display = 'block';
                document.getElementById('pos-size').innerText = btcBalance.toFixed(4) + " BTC";
                document.getElementById('pos-value').innerText = "$" + btcValue.toFixed(2);
            } else {
                posBox.style.display = 'none';
            }

            // Portfolio
            if(document.getElementById('total-equity')) document.getElementById('total-equity').innerText = totalEq.toLocaleString(undefined, {minimumFractionDigits:2});
            
            renderHistory();
            localStorage.setItem('usdt_balance', usdtBalance);
            localStorage.setItem('btc_balance', btcBalance);
            localStorage.setItem('trade_history', JSON.stringify(tradeHistory));
        }

        function executeTrade() {
            const amount = parseFloat(document.getElementById('trade-amount').value);
            if(!amount || amount <= 0) return;
            const cost = amount * livePrice;

            if(currentMode === 'buy') {
                if(cost > usdtBalance) return alert("Insufficient USDT");
                usdtBalance -= cost; btcBalance += amount;
                addHistory('BUY', amount, livePrice, cost);
            } else {
                if(amount > btcBalance) return alert("Insufficient BTC");
                btcBalance -= amount; usdtBalance += cost;
                addHistory('SELL', amount, livePrice, cost);
            }
            document.getElementById('trade-amount').value = '';
            updateUI();
        }

        function exitAllPositions() {
            if(btcBalance <= 0) return;
            const sellTotal = btcBalance * livePrice;
            usdtBalance += sellTotal;
            addHistory('EXIT', btcBalance, livePrice, sellTotal);
            btcBalance = 0;
            alert("Position Closed Successfully");
            updateUI();
        }

        function addHistory(type, amount, price, total) {
            tradeHistory.unshift({ type, amount: amount.toFixed(4), price: price.toFixed(2), total: total.toFixed(2), date: new Date().toLocaleTimeString() });
            if(tradeHistory.length > 10) tradeHistory.pop();
        }

        function renderHistory() {
            const body = document.getElementById('history-body');
            if(!body) return;
            body.innerHTML = tradeHistory.map(h => `
                <tr>
                    <td style="color:${h.type==='BUY'?'var(--green)':'var(--red)'}; font-weight:bold;">${h.type}</td>
                    <td>${h.amount} BTC</td>
                    <td>$${h.price}</td>
                    <td>$${h.total}</td>
                    <td style="color:var(--green)">Filled</td>
                </tr>
            `).join('');
        }

        function setTradeMode(mode) {
            currentMode = mode;
            document.getElementById('buy-mode').style.background = mode === 'buy' ? 'var(--green)' : 'transparent';
            document.getElementById('sell-mode').style.background = mode === 'sell' ? 'var(--red)' : 'transparent';
            document.getElementById('exec-btn').innerText = mode === 'buy' ? 'BUY BTC' : 'SELL BTC';
            document.getElementById('exec-btn').style.background = mode === 'buy' ? 'var(--green)' : 'var(--red)';
            document.getElementById('asset-label').innerText = mode === 'buy' ? 'USDT' : 'BTC';
            updateUI();
        }

        function calculateTotal() {
            const amount = document.getElementById('trade-amount').value || 0;
            document.getElementById('trade-total').innerText = (amount * livePrice).toFixed(2) + " USDT";
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(document.getElementById('nav-' + pageId)) document.getElementById('nav-' + pageId).classList.add('active');
            
            if(pageId === 'spot') {
                new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tradingview_main", "style": "1" });
            }
            updateUI();
        }

        function addFunds() { usdtBalance += 1000; updateUI(); }

        updatePrice();
        showPage('spot');
    </script>
</body>
</html>
