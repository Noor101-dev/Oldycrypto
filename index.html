<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OldyPro | Institutional Crypto Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --bg: #050505;
            --surface: #0b0e11;
            --card: #1e2329;
            --primary: #fcd535;
            --border: #2b3139;
            --text: #eaecef;
            --text-muted: #848e9c;
            --green: #0ecb81;
            --red: #f6465d;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* Fixed: Allows scrolling */
        }

        /* --- Navigation --- */
        nav {
            height: 64px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000; /* Ensure nav stays on top */
        }

        .nav-left, .nav-links { display: flex; align-items: center; gap: 24px; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1px; cursor: pointer; }
        .nav-item { font-size: 0.9rem; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .nav-item:hover, .nav-item.active { color: var(--text); }

        .btn-auth { background: var(--primary); color: black; border: none; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; position: relative; z-index: 10; }
        .user-status { display: none; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 1px solid var(--border); }

        /* --- Page System --- */
        .page { display: none; min-height: calc(100vh - 64px); }
        .page.active { display: block; }

        /* --- UI Fixes --- */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); 
            display: none; /* Controlled by JS */
            justify-content: center; align-items: center; 
            z-index: 9999; /* Higher than everything else */
            backdrop-filter: blur(5px);
        }
        .modal-card { background: var(--card); padding: 40px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid var(--border); }

        .market-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .m-table { width: 100%; border-collapse: collapse; }
        .m-table td, .m-table th { padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }

        .terminal-grid { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 64px); background: var(--border); }
        .chart-box { background: var(--bg); height: 100%; }
        .order-panel { background: var(--surface); padding: 24px; position: relative; z-index: 5; }

        @media (max-width: 1000px) {
            .terminal-grid { grid-template-columns: 1fr; height: auto; }
            .chart-box { height: 400px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="logo" onclick="showPage('home')">OLDYPRO</div>
            <div class="nav-links">
                <div class="nav-item" onclick="showPage('market')">Markets</div>
                <div class="nav-item" onclick="showPage('spot')">Spot</div>
                <div class="nav-item" onclick="showPage('p2p')">P2P</div>
            </div>
        </div>
        <div class="nav-right">
            <div id="auth-out">
                <button class="btn-auth" onclick="toggleModal(true)">Login</button>
            </div>
            <div id="auth-in" class="user-status" onclick="showPage('profile')">
                <span id="user-mail" style="font-size: 0.8rem; color: var(--text-muted);"></span>
                <div class="avatar">U</div>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div style="text-align: center; padding-top: 15vh;">
            <h1 style="font-size: 3.5rem; margin: 0;">Trade Beyond Limits.</h1>
            <p style="color: var(--text-muted); margin-top: 20px;">Institutional grade terminal for @Owner_Noor</p>
            <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
                <button class="btn-auth" style="padding: 15px 40px;" onclick="showPage('spot')">Open Terminal</button>
                <button class="btn-auth" style="background: transparent; border: 1px solid var(--border); color: white; padding: 15px 40px;" onclick="window.open('https://t.me/Owner_Noor')">Contact</button>
            </div>
        </div>
    </div>

    <div id="market" class="page">
        <div class="market-container">
            <h2>Live Markets</h2>
            <table class="m-table">
                <tr><th>Pair</th><th>Price</th><th>Action</th></tr>
                <tr><td>BTC/USDT</td><td>$71,450</td><td><button class="btn-auth" onclick="showPage('spot')">Trade</button></td></tr>
                <tr><td>ETH/USDT</td><td>$3,840</td><td><button class="btn-auth" onclick="showPage('spot')">Trade</button></td></tr>
            </table>
        </div>
    </div>

    <div id="spot" class="page">
        <div class="terminal-grid">
            <div class="chart-box" id="tradingview_main"></div>
            <div class="order-panel">
                <h3>Spot Trade</h3>
                <button class="btn-auth" style="width: 100%; background: var(--green); color: white; margin-bottom: 20px;" onclick="initTrade()">Execute Order</button>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Verified Terminal</p>
            </div>
        </div>
    </div>

    <div id="p2p" class="page" style="padding: 40px;">
        <div style="max-width: 500px; margin: auto; background: var(--surface); padding: 30px; border-radius: 12px; text-align: center;">
            <h2>P2P USDT</h2>
            <button class="btn-auth" style="width: 100%; margin-top: 20px;" onclick="window.open('https://t.me/Owner_Noor')">Chat with Merchant</button>
        </div>
    </div>

    <div id="profile" class="page" style="padding: 40px;">
        <div style="max-width: 500px; margin: auto; background: var(--surface); padding: 30px; border-radius: 8px;">
            <h2>Account Details</h2>
            <p id="profile-email">Not Logged In</p>
            <button class="btn-auth" style="background: var(--red); color: white;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-card">
            <div id="step-1">
                <h2>Gmail Login</h2>
                <input type="email" id="login-email" class="t-input" placeholder="email@gmail.com" style="width: 100%; box-sizing: border-box; margin-bottom: 20px;">
                <button class="btn-auth" style="width: 100%;" onclick="sendMagicLink()">Send Link</button>
                <p onclick="toggleModal(false)" style="cursor:pointer; font-size: 0.8rem; margin-top: 15px;">Close</p>
            </div>
            <div id="step-2" style="display: none;">
                <h2>Check Email</h2>
                <button class="btn-auth" onclick="location.reload()">Refresh</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // --- CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBQ1OFnuMKwshadRL3wbO9g0ibkA4Tj5I8",
            authDomain: "oldycrypto.firebaseapp.com",
            projectId: "oldycrypto",
            storageBucket: "oldycrypto.firebasestorage.app",
            messagingSenderId: "921965725357",
            appId: "1:921965725357:web:016c9d665ad904b5886824"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- NAVIGATION ENGINE ---
        function showPage(pageId) {
            console.log("Switching to: " + pageId); // Debug
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if(target) {
                target.classList.add('active');
                window.scrollTo(0,0);
            }

            if(pageId === 'spot') {
                document.getElementById('tradingview_main').innerHTML = ''; // Reset chart
                new TradingView.widget({
                    "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "60", "theme": "dark",
                    "container_id": "tradingview_main", "hide_side_toolbar": false
                });
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('auth-modal');
            modal.style.display = show ? 'flex' : 'none';
        }

        function sendMagicLink() {
            const email = document.getElementById('login-email').value;
            auth.sendSignInLinkToEmail(email, { url: window.location.href, handleCodeInApp: true })
            .then(() => {
                window.localStorage.setItem('emailForSignIn', email);
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            }).catch(err => alert(err.message));
        }

        // Handle Magic Link Login
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirm Email:');
            auth.signInWithEmailLink(email, window.location.href).then(res => {
                updateUI(res.user);
            });
        }

        auth.onAuthStateChanged(user => { if(user) updateUI(user); });

        function updateUI(user) {
            document.getElementById('auth-out').style.display = 'none';
            document.getElementById('auth-in').style.display = 'flex';
            document.getElementById('user-mail').innerText = user.email;
            document.getElementById('profile-email').innerText = user.email;
            toggleModal(false);
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        function initTrade() {
            if(!auth.currentUser) { alert("Login first!"); toggleModal(true); }
            else { window.open('https://t.me/Owner_Noor?text=Execute_Order'); }
        }
    </script>
</body>
  </html>
