<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oldypro | Professional Exchange Terminal</title>
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --text: #eaecef;
            --yellow: #fcd535; --green: #00c076; --red: #cf304a; --border: #333;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* WALLET SYSTEM */
        .wallet-bar { 
            display: flex; background: var(--card); padding: 15px 25px; border-radius: 10px; 
            margin-bottom: 10px; border: 1px solid var(--border); gap: 40px; align-items: center;
        }
        .wallet-item { display: flex; flex-direction: column; }
        .wallet-label { font-size: 10px; color: #848e9c; font-weight: bold; letter-spacing: 0.5px; }
        .wallet-value { font-size: 16px; font-weight: bold; color: var(--yellow); margin-top: 4px; }

        .terminal-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; height: calc(100vh - 100px); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        h2 { color: var(--yellow); font-size: 0.85rem; text-transform: uppercase; margin: 0 0 15px 0; border-bottom: 1px solid #2b3139; padding-bottom: 10px; }

        /* TRADING PANEL */
        .trade-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 12px; border: 1px solid var(--border); transition: 0.2s; }
        .tab-buy { background: rgba(0, 192, 118, 0.1); color: var(--green); border-color: var(--green); }
        .tab-sell { background: rgba(207, 48, 74, 0.1); color: var(--red); border-color: var(--red); }
        
        input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-top: 6px; outline: none; box-sizing: border-box; }
        label { display: block; font-size: 11px; color: #848e9c; margin-top: 12px; font-weight: bold; }
        
        .exec-btn { width: 100%; border: none; padding: 16px; font-weight: bold; border-radius: 6px; margin-top: 25px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-buy { background: var(--green); color: white; }
        .btn-sell { background: var(--red); color: white; }
        .exec-btn:active { transform: scale(0.97); }

        /* NOTIFICATION POPUP */
        #status-msg { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            padding: 15px 40px; border-radius: 50px; font-weight: bold; 
            display: none; z-index: 9999; color: white; font-size: 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* POSITIONS & MAILBOX */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; color: #848e9c; padding: 10px 5px; font-size: 11px; }
        td { padding: 15px 5px; border-top: 1px solid #2b3139; }
        .msg-list { flex-grow: 1; overflow-y: auto; }
        .msg-box { padding: 12px; background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--yellow); font-size: 13px; display: flex; justify-content: space-between; }
        .st-tag { font-weight: bold; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wallet-bar">
    <div class="wallet-item">
        <span class="wallet-label">TOTAL ASSETS (USDT)</span>
        <span class="wallet-value" id="bal-total">$0.00</span>
    </div>
    <div class="wallet-item">
        <span class="wallet-label">USDT BALANCE</span>
        <span class="wallet-value" id="bal-usdt" style="color:white">0.00</span>
    </div>
    <div class="wallet-item">
        <span class="wallet-label">BITCOIN (BTC)</span>
        <span class="wallet-value" id="bal-btc" style="color:white">0.0000</span>
    </div>
    <div class="wallet-item">
        <span class="wallet-label">ETHEREUM (ETH)</span>
        <span class="wallet-value" id="bal-eth" style="color:white">0.0000</span>
    </div>
</div>

<div class="terminal-grid">
    <div class="card">
        <h2>Place Order</h2>
        <div class="trade-tabs">
            <div class="tab tab-buy" id="tab-buy" onclick="setSide('BUY')">LONG</div>
            <div class="tab tab-sell" id="tab-sell" onclick="setSide('SELL')" style="opacity:0.4;">SHORT</div>
        </div>
        
        <label>LEVERAGE</label>
        <select id="leverage">
            <option value="1">1x (Spot)</option>
            <option value="10">10x</option>
            <option value="20">20x</option>
            <option value="50">50x</option>
        </select>

        <label>ORDER AMOUNT (USDT)</label>
        <input type="number" id="trade-amt" placeholder="0.00">
        
        <div style="margin-top:20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px;">
            <span style="color:#848e9c; font-size: 12px;">BTC Mark Price:</span> 
            <span id="price-val" style="color:var(--yellow); font-weight:bold; float: right;">---</span>
        </div>

        <button id="exec-btn" class="exec-btn btn-buy" onclick="executeTrade()">EXECUTE BUY</button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px;">
        <div class="card" style="flex: 1.5;">
            <h2>Active Positions</h2>
            <table>
                <thead>
                    <tr><th>Asset</th><th>Size</th><th>Entry</th><th>PnL</th></tr>
                </thead>
                <tbody id="pos-body">
                    <tr><td colspan="4" style="text-align:center; padding:40px; color:#444;">No Open Trades</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="card" style="flex: 1;">
            <h2>Mailbox</h2>
            <div id="mailbox" class="msg-list">
                <div class="msg-box">Welcome to Oldypro Terminal. System Ready.</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Banking & Requests</h2>
        <label>DEPOSIT (YOUR TELEGRAM ID)</label>
        <input type="text" id="dep-tg" placeholder="@username">
        <input type="number" id="dep-val" placeholder="Amount USDT" style="margin-top:10px;">
        <button class="exec-btn btn-buy" style="padding:12px; margin-top:15px;" onclick="finance('deposit')">DEPOSIT REQUEST</button>

        <label style="margin-top:30px;">WITHDRAW (BEP20 WALLET)</label>
        <input type="text" id="wd-addr" placeholder="0x...">
        <input type="number" id="wd-val" placeholder="Amount USDT" style="margin-top:10px;">
        <button class="exec-btn btn-sell" style="padding:12px; margin-top:15px;" onclick="finance('withdraw')">WITHDRAW REQUEST</button>
    </div>
</div>

<div id="status-msg"></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwq8sQ_uVmvKHLGwHB2j5CgcRlfLsjeODcx8R4RvYGFBwnPaPcaDfMqgB6mQUlQadDL4Q/exec";
    let side = 'BUY';

    // 1. Live Price (WebSocket)
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        document.getElementById('price-val').innerText = parseFloat(d.c).toFixed(2);
    };

    // 2. UI Helper
    function setSide(s) {
        side = s;
        document.getElementById('exec-btn').innerText = `EXECUTE ${side}`;
        document.getElementById('exec-btn').className = s === 'BUY' ? 'exec-btn btn-buy' : 'exec-btn btn-sell';
        document.getElementById('tab-buy').style.opacity = s === 'BUY' ? '1' : '0.4';
        document.getElementById('tab-sell').style.opacity = s === 'SELL' ? '1' : '0.4';
    }

    function notify(text, color) {
        const el = document.getElementById('status-msg');
        el.innerText = text;
        el.style.display = 'block';
        el.style.background = color === 'green' ? '#00c076' : '#cf304a';
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // 3. Execution
    async function executeTrade() {
        const amt = document.getElementById('trade-amt').value;
        if(!amt) return alert("Please enter amount");
        notify("ORDER REQUEST HAS BEEN SENDED", 'green');
        
        await fetch(GAS_URL, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ action: "trade", side, amt, tg: document.getElementById('dep-tg').value }) 
        });
    }

    async function finance(type) {
        const val = type === 'deposit' ? document.getElementById('dep-val').value : document.getElementById('wd-val').value;
        const tg = document.getElementById('dep-tg').value;
        if(!val || !tg) return alert("Fill all fields");

        notify("REQUEST HAS BEEN SENDED", 'green');

        const payload = {
            action: "request",
            type: type,
            amount: val,
            tg: tg,
            address: document.getElementById('wd-addr').value
        };

        await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    }

    // 4. Mailbox Sync (Auto-refreshes every 10s)
    async function syncMail() {
        const tgUser = document.getElementById('dep-tg').value.replace('@', '');
        if(!tgUser) return;
        
        try {
            const res = await fetch(`${GAS_URL}?action=getMail&user=${tgUser}`);
            const data = await res.json();
            const box = document.getElementById('mailbox');
            if(data) {
                box.innerHTML = `<div class="msg-box">
                    <span>${data.text}</span>
                    <span class="st-tag" style="color:${data.status === 'ACCEPTED' ? '#00c076' : '#cf304a'}">${data.status}</span>
                </div>`;
            }
        } catch(e) {}
    }
    setInterval(syncMail, 10000);
</script>

</body>
</html>
